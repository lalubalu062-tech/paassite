<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Paassite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-slate-100">
        <h2 class="text-2xl font-bold text-center text-sky-600 mb-6">Create an Account</h2>
        <form action="/signup" method="POST" class="space-y-4">
            <div><label class="block text-sm font-medium text-slate-700">Full Name</label>
            <input type="text" name="name" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"></div>
            
            <div><label class="block text-sm font-medium text-slate-700">Username</label>
            <input type="text" name="username" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"></div>
            
            <div><label class="block text-sm font-medium text-slate-700">Email Address</label>
            <input type="email" name="email" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"></div>
            
            <div><label class="block text-sm font-medium text-slate-700">Password</label>
            <input type="password" name="password" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"></div>
            
            <div><label class="block text-sm font-medium text-slate-700">Repeat Password</label>
            <input type="password" name="repeat_password" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"></div>
            
            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 px-4 rounded-md transition mt-4">Sign Up</button>
        </form>
        <p class="mt-4 text-center text-sm text-slate-600">Already have an account? <a href="/login" class="text-sky-500 hover:underline">Log in</a></p>
    </div>
</body>
</html>
