<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Paassite</title>
    <!-- Tailwind CSS for modern Railway-like styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased flex h-screen overflow-hidden">

    <!-- LEFT SIDEBAR -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shadow-sm">
        <!-- Brand Logo -->
        <div class="h-16 flex items-center px-6 border-b border-slate-200">
            <span class="font-bold text-2xl text-sky-600 tracking-tight">▲ Paassite</span>
        </div>
        
        <!-- Navigation Menu -->
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <p class="px-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" data-lang="nav_main">Main</p>
            <a href="#" class="flex items-center px-3 py-2.5 bg-sky-50 text-sky-700 rounded-md font-medium transition">
                <i class="fa-solid fa-layer-group w-6"></i>
                <span data-lang="nav_projects">Projects</span>
            </a>
            <a href="#" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-100 rounded-md font-medium transition">
                <i class="fa-solid fa-rocket w-6"></i>
                <span data-lang="nav_deploy">Deployments</span>
            </a>
            <a href="#" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-100 rounded-md font-medium transition">
                <i class="fa-solid fa-database w-6"></i>
                <span data-lang="nav_database">Databases</span>
            </a>
            
            <p class="px-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mt-6 mb-2" data-lang="nav_manage">Manage</p>
            <a href="#" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-100 rounded-md font-medium transition">
                <i class="fa-solid fa-chart-line w-6"></i>
                <span data-lang="nav_metrics">Metrics</span>
            </a>
            <a href="#" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-100 rounded-md font-medium transition">
                <i class="fa-solid fa-gear w-6"></i>
                <span data-lang="nav_settings">Settings</span>
            </a>
        </nav>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col h-full relative">
        
        <!-- TOP HEADER (Right Side Profile & Language) -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-10">
            <!-- Breadcrumbs / Title -->
            <div class="flex items-center text-slate-500 font-medium">
                <span class="hover:text-slate-800 cursor-pointer" data-lang="header_home">Home</span>
                <span class="mx-2">/</span>
                <span class="text-slate-900" data-lang="header_projects">Projects</span>
            </div>
            
            <!-- Right Side Controls -->
            <div class="flex items-center space-x-6">
                <!-- Language Switcher -->
                <div class="flex items-center border border-slate-300 rounded-md px-2 py-1 bg-slate-50">
                    <i class="fa-solid fa-globe text-slate-500 mr-2"></i>
                    <select id="language-selector" onchange="changeLanguage(this.value)" class="bg-transparent text-sm font-medium focus:outline-none text-slate-700 cursor-pointer">
                        <option value="en">English</option>
                        <option value="hi">हिंदी</option>
                    </select>
                </div>
                
                <!-- Profile Avatar -->
                <div class="w-9 h-9 bg-sky-500 hover:bg-sky-600 transition cursor-pointer text-white rounded-full flex items-center justify-center font-bold shadow-sm border-2 border-white ring-2 ring-slate-200">
                    P
                </div>
            </div>
        </header>

        <!-- DASHBOARD WORKSPACE -->
        <main class="flex-1 overflow-auto bg-slate-50 p-8">
            <div class="max-w-6xl mx-auto">
                
                <!-- Page Action Header -->
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-3xl font-bold text-slate-800" data-lang="page_title">Your Projects</h1>
                        <p class="text-slate-500 text-sm mt-1" data-lang="page_desc">Manage and deploy your web applications and services.</p>
                    </div>
                    <button class="bg-sky-500 hover:bg-sky-600 shadow-md shadow-sky-500/20 text-white px-5 py-2.5 rounded-md font-bold text-sm transition flex items-center">
                        <i class="fa-solid fa-plus mr-2"></i> <span data-lang="btn_new_project">New Project</span>
                    </button>
                </div>

                <!-- Projects Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Project Card -->
                    <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm hover:border-sky-400 hover:shadow-md transition cursor-pointer group">
                        <div class="flex justify-between items-start mb-4">
                            <div class="h-12 w-12 bg-sky-50 text-sky-600 rounded-lg flex items-center justify-center text-xl shadow-sm border border-sky-100 group-hover:bg-sky-500 group-hover:text-white transition">
                                <i class="fa-brands fa-python"></i>
                            </div>
                            <!-- Live Status -->
                            <div class="flex items-center bg-green-50 text-green-700 px-2.5 py-1 rounded-full text-xs font-bold border border-green-200">
                                <span class="relative flex h-2 w-2 mr-2">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                                </span>
                                Live
                            </div>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800 mb-1">Paassite Testing Server</h2>
                        <p class="text-sm text-slate-500 mb-4 font-mono">nonohub.eu.cc</p>
                        
                        <div class="border-t border-slate-100 pt-4 flex justify-between items-center text-xs text-slate-500 font-medium">
                            <span class="flex items-center"><i class="fa-brands fa-github mr-1.5"></i> main branch</span>
                            <span data-lang="status_updated">Updated 2m ago</span>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- LANGUAGE LOCALIZATION SCRIPT -->
    <script>
        // Dictionary for translation (Add more languages or texts here)
        const translations = {
            "en": {
                "nav_main": "Main", "nav_projects": "Projects", "nav_deploy": "Deployments", "nav_database": "Databases",
                "nav_manage": "Manage", "nav_metrics": "Metrics", "nav_settings": "Settings",
                "header_home": "Home", "header_projects": "Projects",
                "page_title": "Your Projects", "page_desc": "Manage and deploy your web applications and services.",
                "btn_new_project": "New Project", "status_updated": "Updated 2m ago"
            },
            "hi": {
                "nav_main": "मुख्य", "nav_projects": "प्रोजेक्ट्स", "nav_deploy": "डिप्लॉयमेंट", "nav_database": "डेटाबेस",
                "nav_manage": "मैनेज", "nav_metrics": "मेट्रिक्स", "nav_settings": "सेटिंग्स",
                "header_home": "होम", "header_projects": "प्रोजेक्ट्स",
                "page_title": "आपके प्रोजेक्ट्स", "page_desc": "अपने वेब एप्लिकेशन और सर्विसेज को मैनेज और डिप्लॉय करें।",
                "btn_new_project": "नया प्रोजेक्ट", "status_updated": "2 मिनट पहले अपडेट किया गया"
            }
        };

        // Function to change language text on the screen
        function changeLanguage(lang) {
            document.getElementById("language-selector").value = lang;
            document.querySelectorAll("[data-lang]").forEach(el => {
                const key = el.getAttribute("data-lang");
                if (translations[lang] && translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });
            // Save preference in browser so it remembers next time
            localStorage.setItem("user_lang", lang);
        }

        // Auto IP-Based Language Detection
        async function autoDetectLanguage() {
            // First check if user already manually selected a language before
            const savedLang = localStorage.getItem("user_lang");
            if (savedLang) {
                changeLanguage(savedLang);
                return;
            }

            // If new user, fetch IP location to set language automatically
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                // If user is from India, set to Hindi automatically
                if (data.country_code === 'IN') {
                    changeLanguage('hi');
                } else {
                    changeLanguage('en'); // Default to English for other countries
                }
            } catch (error) {
                console.error("IP Detection failed, defaulting to English", error);
                changeLanguage('en');
            }
        }

        // Run detection when page loads
        window.onload = autoDetectLanguage;
    </script>
</body>
</html>
